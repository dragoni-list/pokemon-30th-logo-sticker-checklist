<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬 30주년 로고 스티커 체크리스트</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #111; margin-bottom: 20px; }
        
        /* 세대별 상단 탭 버튼 레이아웃 */
        .tab-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 1200px; margin: 0 auto 30px auto; }
        .tab-btn { background-color: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 8px 16px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background-color: #eee; }
        .tab-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* 내 리스트 전용 특별 탭 색상 */
        .tab-btn.my-list-btn { background-color: #10b981; color: white; border-color: #10b981; }
        .tab-btn.my-list-btn:hover { background-color: #059669; }
        
        /* 반응형 카드 그리드 배치 */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        /* 이미지 영역 스타일 */
        .pokemon-img { width: 110px; height: 110px; object-fit: contain; margin-bottom: 10px; background-color: #f1f5f9; border-radius: 8px; }
        .pokemon-info { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .number { color: #888; font-size: 12px; margin-right: 4px; }
        
        /* +, - 수량 조절 인터페이스 */
        .counter-container { display: flex; align-items: center; gap: 12px; }
        .btn { background-color: #eee; border: none; border-radius: 6px; width: 30px; height: 30px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #ddd; }
        .count { font-size: 16px; font-weight: bold; min-width: 20px; }
        
        /* 리스트가 비어있을 때 메시지 창 */
        .empty-message { grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <h1>포켓몬 30주년 로고 스티커 체크리스트</h1>
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('1', event)">1세대</button>
        <button class="tab-btn" onclick="switchTab('2', event)">2세대</button>
        <button class="tab-btn" onclick="switchTab('3', event)">3세대</button>
        <button class="tab-btn" onclick="switchTab('4', event)">4세대</button>
        <button class="tab-btn" onclick="switchTab('5', event)">5세대</button>
        <button class="tab-btn" onclick="switchTab('6', event)">6세대</button>
        <button class="tab-btn" onclick="switchTab('7', event)">7세대</button>
        <button class="tab-btn" onclick="switchTab('8', event)">8세대</button>
        <button class="tab-btn" onclick="switchTab('9', event)">9세대</button>
        <button class="tab-btn my-list-btn" onclick="switchTab('my', event)">내 리스트 (<span id="total-owned">0</span>)</button>
    </div>

    <div class="grid-container" id="pokemon-grid"></div>

    <script>
        let currentTab = '1';

        // ================================================================
        // 1. [이름 주머니] 중복 번호 및 확장 번호를 문자열 키("")로 등록합니다.
        // ================================================================
        const pokemonNames = {
            // 1세대 (1 ~ 151)
            1: "이상해씨", 2: "이상해풀", 3: "이상해꽃", 4: "파이리", 5: "리자드", 6: "리자몽", 7: "꼬부기", 8: "어니부기", 9: "거북왕", 10: "캐터피",
            // ... (기존 데이터 유지) ...

            // 9세대 영역 예시 (시트 상태와 동일하게 매칭)
            1023: "무쇠감투",
            1024: "테라파고스(노말폼)",
            "1024_1": "테라파고스(테라스탈폼)", // 같은 번호는 뒤에 _1, _2 등을 붙여 고유 키로 만듭니다.
            "1024_2": "테라파고스(스텔라폼)",
            1025: "복숭악동"
        };

        // ================================================================
        // 2. [예외 이미지 주머니] 
        // ================================================================
        const pokemonImages = {
            670: "https://data1.pokemonkorea.co.kr/newdata/pokedex/mid/067002.png" 
        };

        // 도감 번호 키를 기반으로 이미지 주소용 파일명을 가공하는 함수
        function getPokemonImageName(key) {
            const strKey = String(key);
            // 키에 언더바(_)가 붙어있다면 그대로 살려서 패딩 (예: "1024_1" -> "1024_1.png")
            if (strKey.includes('_')) {
                const parts = strKey.split('_');
                return parts[0].padStart(4, '0') + '_' + parts[1] + '.png';
            }
            return strKey.padStart(4, '0') + '.png';
        }

        // 세대 판별 함수 (언더바 뒤를 잘라내고 순수 앞 숫자로만 세대 계산)
        function getGeneration(key) {
            const mainId = parseInt(String(key).split('_')[0]);
            if (mainId >= 1 && mainId <= 151) return '1';
            if (mainId >= 152 && mainId <= 251) return '2';
            if (mainId >= 252 && mainId <= 386) return '3';
            if (mainId >= 387 && mainId <= 493) return '4';
            if (mainId >= 494 && mainId <= 649) return '5';
            if (mainId >= 650 && mainId <= 721) return '6';
            if (mainId >= 722 && mainId <= 809) return '7';
            if (mainId >= 810 && mainId <= 905) return '8';
            if (mainId >= 906) return '9'; 
            return 'ETC';
        }

        // 고정 루프(for) 대신 이름 주머니에 채워진 객체의 키(Key) 전체를 순회하도록 설계 변경
        const pokemonList = [];
        Object.keys(pokemonNames).forEach(key => {
            const fileName = getPokemonImageName(key);
            const finalImg = pokemonImages[key] || `https://www.pokemon.co.jp/ex/30th_logo/assets/img/download/${fileName}`;
            
            // No.1024_1 형태 대신 화면에는 순수하게 No.1024 로 보이도록 연출 가공
            const displayId = String(key).split('_')[0];

            pokemonList.push({
                id: key, // 로컬스토리지 저장 및 제어용 유니크 키 ("1024", "1024_1")
                displayId: displayId, // 화면 표시용 번호 ("1024")
                name: pokemonNames[key], 
                img: finalImg,
                gen: getGeneration(key)
            });
        });

        function renderGrid() {
            const gridContainer = document.getElementById('pokemon-grid');
            gridContainer.innerHTML = ''; 
            let visibleCount = 0;

            pokemonList.forEach(pokemon => {
                const savedCount = parseInt(localStorage.getItem(`poke30th-${pokemon.id}`)) || 0;

                if (currentTab !== 'my' && pokemon.gen !== currentTab) return;
                if (currentTab === 'my' && savedCount === 0) return;

                visibleCount++;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="pokemon-img" src="${pokemon.img}" alt="${pokemon.name}" loading="lazy" onerror="this.style.opacity='0.5';">
                    <div class="pokemon-info"><span class="number">No.${pokemon.displayId}</span>${pokemon.name}</div>
                    <div class="counter-container">
                        <button class="btn" onclick="changeCount('${pokemon.id}', -1)">-</button>
                        <span class="count" id="count-${pokemon.id}">${savedCount}</span>
                        <button class="btn" onclick="changeCount('${pokemon.id}', 1)">+</button>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            if (visibleCount === 0 && currentTab === 'my') {
                gridContainer.innerHTML = `<div class="empty-message">아직 체크된 스티커가 없습니다. 다른 세대 탭에서 스티커 수량을 추가해 보세요!</div>`;
            }
        }

        function changeCount(id, change) {
            const countElement = document.getElementById(`count-${id}`);
            let currentCount = parseInt(countElement.innerText);
            currentCount += change;
            
            if (currentCount < 0) currentCount = 0; 
            countElement.innerText = currentCount;
            
            localStorage.setItem(`poke30th-${id}`, currentCount);
            updateTotalOwnedCount();
            
            if (currentTab === 'my' && currentCount === 0) renderGrid();
        }

        function switchTab(tabName, event) {
            currentTab = tabName;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (event && event.target) {
                event.target.classList.add('active');
            }
            renderGrid(); 
        }

        function updateTotalOwnedCount() {
            let total = 0;
            pokemonList.forEach(pokemon => {
                const count = parseInt(localStorage.getItem(`poke30th-${pokemon.id}`)) || 0;
                if (count > 0) total++;
            });
            document.getElementById('total-owned').innerText = total;
        }

        // 초기 실행
        updateTotalOwnedCount();
        renderGrid();
    </script>
</body>
</html>
