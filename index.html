    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #111; margin-bottom: 20px; }
        .tab-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 1200px; margin: 0 auto 30px auto; padding: 0 10px; }
        .tab-btn { background-color: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .tab-btn.my-list-btn { background-color: #10b981; color: white; border-color: #10b981; }
        
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-width: 1200px; margin: 0 auto; padding: 10px; min-height: 300px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .pokemon-img { width: 85px; height: 85px; object-fit: contain; margin-bottom: 5px; background-color: #f1f5f9; border-radius: 8px; }
        .pokemon-info { font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .number { color: #888; font-size: 7px; margin-right: 3px; }
        .btn { background-color: #eee; border: none; border-radius: 4px; width: 20px; height: 20px;font-size:12px; cursor: pointer; }
        .empty-message { grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; }
        
        @media screen and (max-width: 768px) {
            input { font-size: 14px !important; }
        }
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
            .pokemon-img { width: 60px; height: 60px; }
        }
    </style>

    pokemonList.forEach(p => {
        // changeCount에서 저장하는 키 형식(`poke30th-${id}`)과 일치시켜야 합니다.
        const count = parseInt(localStorage.getItem(`poke30th-${p.id}`)) || 0;
        if (count > 0) total++;
    });
    const totalEl = document.getElementById('total-owned');
    if (totalEl) totalEl.innerText = total;
}

        // 도감 번호를 기반으로 세대를 자동으로 쪼개주는 기준점 함수
        function getGeneration(id) {
            if (id >= 1 && id <= 151) return '1';
            if (id >= 152 && id <= 251) return '2';
            if (id >= 252 && id <= 386) return '3';
            if (id >= 387 && id <= 493) return '4';
            if (id >= 494 && id <= 649) return '5';
            if (id >= 650 && id <= 721) return '6';
            if (id >= 722 && id <= 809) return '7';
            if (id >= 810 && id <= 905) return '8';
            if (id >= 906 && id <= 1025) return '9'; 
            return 'ETC';
        }

        // 모든 키를 가져와 숫자로 변환하여 정렬 (670_1도 670 바로 뒤로 자동 정렬됨)
        const allKeys = Object.keys(pokemonNames).sort((a, b) => {
            const valA = parseFloat(a.replace('_', '.'));
            const valB = parseFloat(b.replace('_', '.'));
            return valA - valB;
        });

        allKeys.forEach(key => {
            const displayId = parseInt(key.split('_')[0]);
            if (displayId <= 1025) {
                pokemonList.push({
                    id: key,
                    displayId: displayId,
                    name: pokemonNames[key],
                    img: pokemonImages[key] || `https://www.pokemon.co.jp/ex/30th_logo/assets/img/download/${String(displayId).padStart(4, '0')}.png`,
                    gen: getGeneration(displayId)
                });
            }
        });

            gridContainer.innerHTML = '';
            
            const searchInput = document.getElementById('search-id');
            const searchVal = searchInput ? searchInput.value.trim() : '';
            let visibleCount = 0;

            pokemonList.forEach(pokemon => {
                const savedCount = parseInt(localStorage.getItem(`poke30th-${pokemon.id}`)) || 0;

                if (currentTab === 'search') {
    // 검색어가 있고, 포켓몬 이름에 검색어가 포함되지 않으면 화면에서 제외
    if (searchVal !== '' && !pokemon.name.includes(searchVal)) return;
} else if (currentTab === 'my') {
    if (savedCount === 0) return;
} else if (pokemon.gen !== currentTab) return;
                
                visibleCount++;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="pokemon-img" src="${pokemon.img}" alt="${pokemon.name}">
                    <div class="pokemon-info"><span class="number">No.${pokemon.displayId}</span>${pokemon.name}</div>
                    <div class="counter-container">
                        <button class="btn" onclick="changeCount('${pokemon.id}', -1)">-</button>
                        <span class="count" id="count-${pokemon.id}">${savedCount}</span>
                        <button class="btn" onclick="changeCount('${pokemon.id}', 1)">+</button>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            if (visibleCount === 0) {
                gridContainer.innerHTML = `<div class="empty-message">해당하는 포켓몬이 없습니다.</div>`;
            }
        }
function changeCount(id, delta) {
    const key = `poke30th-${id}`;
    let count = parseInt(localStorage.getItem(key)) || 0;
    count = Math.max(0, count + delta); // 0 밑으로는 안 내려가게 설정
    
    localStorage.setItem(key, count);
    
    // UI 업데이트
    const countEl = document.getElementById(`count-${id}`);
    if (countEl) countEl.innerText = count;
    
    // 내 리스트 카운트 갱신
    updateTotalOwnedCount();
    
    // '내 리스트' 탭일 때는 수량이 0이 되면 즉시 화면에서 제거
    if (currentTab === 'my') {
        renderGrid();
    }
}
        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(tabName === 'search' ? '검색' : (tabName === 'my' ? '내 리스트' : tabName + '세대')));
            });

            const existingSearchBox = document.getElementById('search-box');
            if (existingSearchBox) existingSearchBox.remove();

            if (currentTab === 'search') {
                const searchBox = document.createElement('div');
                searchBox.id = 'search-box';
                searchBox.style.cssText = 'display: flex; justify-content: center; margin-bottom: 20px;';
                searchBox.innerHTML = `<input type="text" id="search-id" placeholder="포켓몬 이름 검색(예: 피카츄)" oninput="renderGrid()" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 200px; text-align: center; font-size: 16px;">`;
    document.body.insertBefore(searchBox, document.getElementById('pokemon-grid'));
            }
            renderGrid();
        }

        // 초기 실행
        switchTab('1');
        updateTotalOwnedCount();
    </script>
