<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬 30주년 로고 스티커 체크리스트</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #111; margin-bottom: 20px; }
        
        /* 세대별 상단 탭 버튼 레이아웃 */
        .tab-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 1200px; margin: 0 auto 30px auto; }
        .tab-btn { background-color: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 8px 16px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background-color: #eee; }
        .tab-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* 내 리스트 전용 특별 탭 색상 */
        .tab-btn.my-list-btn { background-color: #10b981; color: white; border-color: #10b981; }
        .tab-btn.my-list-btn:hover { background-color: #059669; }
        
        /* 반응형 카드 그리드 배치 */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        /* 이미지 영역 스타일 */
        .pokemon-img { width: 110px; height: 110px; object-fit: contain; margin-bottom: 10px; background-color: #f1f5f9; border-radius: 8px; }
        .pokemon-info { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .number { color: #888; font-size: 12px; margin-right: 4px; }
        
        /* +, - 수량 조절 인터페이스 */
        .counter-container { display: flex; align-items: center; gap: 12px; }
        .btn { background-color: #eee; border: none; border-radius: 6px; width: 30px; height: 30px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #ddd; }
        .count { font-size: 16px; font-weight: bold; min-width: 20px; }
        
        /* 리스트가 비어있을 때 메시지 창 */
        .empty-message { grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <h1>포켓몬 30주년 로고 스티커 체크리스트</h1>
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('all')">전체보기</button>
        <button class="tab-btn" onclick="switchTab('1')">1세대</button>
        <button class="tab-btn" onclick="switchTab('2')">2세대</button>
        <button class="tab-btn" onclick="switchTab('3')">3세대</button>
        <button class="tab-btn" onclick="switchTab('4')">4세대</button>
        <button class="tab-btn" onclick="switchTab('5')">5세대</button>
        <button class="tab-btn" onclick="switchTab('6')">6세대</button>
        <button class="tab-btn" onclick="switchTab('7')">7세대</button>
        <button class="tab-btn" onclick="switchTab('8')">8세대</button>
        <button class="tab-btn" onclick="switchTab('9')">9세대</button>
        <button class="tab-btn my-list-btn" onclick="switchTab('my')">내 리스트 (<span id="total-owned">0</span>)</button>
    </div>

    <div class="grid-container" id="pokemon-grid"></div>

    <script>
        let currentTab = 'all';

        // ================================================================
        // 1. [이름 주머니] 시트에서 수식(=A2 & ": """ & B2 & """,")으로 뽑은 이름 목록을 이 자리에 계속 채워 넣으세요!
        // ================================================================
        const pokemonNames = {
            1: "이상해씨", 2: "이상해풀", 3: "이상해꽃", 4: "파이리", 5: "리자드", 6: "리자몽",
            686: "오케이징", 687: "칼라마네로", 688: "거북손손", 689: "거북손데스", 690: "수레기", 691: "드래캄"
            // 수식 결과 텍스트들을 복사해서 이 괄호 안에 계속 쉼표(,)로 이어 붙이시면 작동합니다.
        };

        // ================================================================
        // 2. [예외 이미지 주머니] 중간에 다른 형태의 이미지 주소가 들어간 애들은 번호와 진짜 주소를 한 줄씩 지정해 줍니다.
        // ================================================================
        const pokemonImages = {
            670: "https://data1.pokemonkorea.co.kr/newdata/pokedex/mid/067002.png" // 플라베베(영원의 꽃) 예시
            // 안 나오는 사진 주소를 발견할 때마다 여기에 [도감번호: "진짜주소",] 형태로 한 줄씩 추가하시면 됩니다.
        };

        // 도감 번호를 기반으로 세대를 자동으로 쪼개주는 기준점 함수
        function getGeneration(id) {
            if (id >= 1 && id <= 151) return '1';
            if (id >= 152 && id <= 251) return '2';
            if (id >= 252 && id <= 386) return '3';
            if (id >= 387 && id <= 493) return '4';
            if (id >= 494 && id <= 649) return '5';
            if (id >= 650 && id <= 721) return '6';
            if (id >= 722 && id <= 809) return '7';
            if (id >= 810 && id <= 905) return '8';
            if (id >= 906 && id <= 1165) return '9'; // 시트 마지막 범위까지 모두 커버
            return 'ETC';
        }

        const pokemonList = [];
        // 기본 이미지 다운로드 규칙에 맞게 1번부터 1165번까지 카드를 자동으로 찍어내는 반복문
        for (let i = 1; i <= 1165; i++) {
            const padId = String(i).padStart(4, '0'); 
            
            // 예외 이미지 주머니에 등록된 주소가 있으면 그걸 우선 적용하고, 없으면 일본 공식 다운로드 규칙 주소를 사용합니다.
            const finalImg = pokemonImages[i] || `https://www.pokemon.co.jp/ex/30th_logo/assets/img/download/${padId}.png`;
            
            pokemonList.push({
                id: i,
                name: pokemonNames[i] || `포켓몬 #${i}`, // 아직 이름 주머니에 등록하지 않은 번호는 숫자로 임시 표기됩니다.
                img: finalImg,
                gen: getGeneration(i)
            });
        }

        // 화면에 선택된 세대나 보유 목록에 부합하는 카드를 동적으로 렌더링해 주는 핵심 제어 함수
        function renderGrid() {
            const gridContainer = document.getElementById('pokemon-grid');
            gridContainer.innerHTML = ''; // 기존 카드 화면을 싹 비워줍니다.
            let visibleCount = 0;

            pokemonList.forEach(pokemon => {
                const savedCount = parseInt(localStorage.getItem(`poke30th-${pokemon.id}`)) || 0;

                // 필터 조건 제어: 현재 탭 세대와 일치하지 않거나, '내 리스트' 탭인데 수량이 0개면 건너뛰기(패스)
                if (currentTab !== 'all' && currentTab !== 'my' && pokemon.gen !== currentTab) return;
                if (currentTab === 'my' && savedCount === 0) return;
